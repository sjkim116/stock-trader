name: CI - Test, Build, Push

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

# OIDC requires id-token: write. contents: read keeps everything else minimal.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY_USER_API: algotrader/user-api
  ECR_REPOSITORY_MARKET_DATA: algotrader/market-data-collector

jobs:
  test-user-api:
    name: Test User API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: algotrader
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: algotrader_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend/user-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linters
        working-directory: ./backend/user-api
        run: |
          black --check app/
          flake8 app/
          mypy app/

      - name: Run tests
        working-directory: ./backend/user-api
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: algotrader_test
          DATABASE_USERNAME: algotrader
          DATABASE_PASSWORD: test_password
          TIMESCALEDB_HOST: localhost
          TIMESCALEDB_PORT: 5432
          TIMESCALEDB_NAME: algotrader_test
          TIMESCALEDB_USERNAME: algotrader
          TIMESCALEDB_PASSWORD: test_password
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test
        run: |
          if [ -d tests ] && [ -n "$(find tests -name 'test_*.py' -print -quit)" ]; then
            pytest tests/ --cov=app --cov-report=xml
          else
            echo "No tests yet; skipping pytest. Add tests under backend/user-api/tests/ to enable."
          fi

      - name: Upload coverage
        if: ${{ hashFiles('./backend/user-api/coverage.xml') != '' }}
        uses: codecov/codecov-action@v6
        with:
          file: ./backend/user-api/coverage.xml
          flags: user-api

  build-user-api:
    name: Build User API Docker Image
    runs-on: ubuntu-latest
    needs: test-user-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend/user-api
          file: ./backend/user-api/Dockerfile
          push: false
          tags: algotrader/user-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-market-data-collector:
    name: Test Market Data Collector
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: algotrader
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: algotrader_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'
          cache-dependency-path: backend/market-data-collector/go.sum

      - name: Install dependencies
        working-directory: ./backend/market-data-collector
        run: go mod download

      - name: Run linters
        working-directory: ./backend/market-data-collector
        run: |
          go fmt ./...
          go vet ./...

      - name: Run tests
        working-directory: ./backend/market-data-collector
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: algotrader_test
          DATABASE_USERNAME: algotrader
          DATABASE_PASSWORD: test_password
          ENVIRONMENT: test
        run: |
          if [ -n "$(find . -name '*_test.go' -print -quit)" ]; then
            go test -v -race -coverprofile=coverage.out ./...
          else
            echo "No tests yet; skipping go test."
          fi

      - name: Upload coverage
        if: ${{ hashFiles('./backend/market-data-collector/coverage.out') != '' }}
        uses: codecov/codecov-action@v6
        with:
          file: ./backend/market-data-collector/coverage.out
          flags: market-data-collector

  build-market-data-collector:
    name: Build Market Data Collector Docker Image
    runs-on: ubuntu-latest
    needs: test-market-data-collector

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend/market-data-collector
          file: ./backend/market-data-collector/Dockerfile
          push: false
          tags: algotrader/market-data-collector:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # ECR push jobs — main branch only.
  #
  # Authentication: GitHub Actions OIDC (preferred). Configure the IAM role
  # ARN as the repository variable `AWS_OIDC_ROLE_ARN`. The role is provisioned
  # by the Terraform module `modules/github_oidc` once `github_repository` is
  # set in the root tfvars.
  #
  # Fallback (NOT recommended for shared/production accounts): static IAM user
  # credentials in secrets. Replace the `Configure AWS credentials` step with:
  #
  #   - uses: aws-actions/configure-aws-credentials@v6
  #     with:
  #       aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
  #       aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  #       aws-region: ${{ env.AWS_REGION }}
  # ---------------------------------------------------------------------------

  push-user-api:
    name: Push User API image to ECR
    runs-on: ubuntu-latest
    needs: [ test-user-api, build-user-api ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend/user-api
          file: ./backend/user-api/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_USER_API }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_USER_API }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-market-data-collector:
    name: Push Market Data Collector image to ECR
    runs-on: ubuntu-latest
    needs: [ test-market-data-collector, build-market-data-collector ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend/market-data-collector
          file: ./backend/market-data-collector/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_MARKET_DATA }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_MARKET_DATA }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
