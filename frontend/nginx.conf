# Frontend nginx site config.
#
# Serves the Vite-built SPA from /usr/share/nginx/html and reverse-
# proxies /api/* to the user-api container on the docker-compose
# network. The browser only ever talks to this one origin, so no
# CORS gymnastics on the backend.

server {
    listen 80 default_server;
    server_name _;

    # SPA: serve static assets, fall back to index.html for client-side routes.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed bundle assets; index.html stays no-cache so a
    # new bundle is picked up immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Proxy to user-api. The "user-api" hostname resolves via Docker's
    # service DNS on the algotrader-network.
    location /api/ {
        proxy_pass http://user-api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Convenience: hit /docs on the public origin to land in FastAPI Swagger.
    location /docs {
        proxy_pass http://user-api:8000/docs;
    }
    location /openapi.json {
        proxy_pass http://user-api:8000/openapi.json;
    }

    # Basic health endpoint for the load balancer.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
